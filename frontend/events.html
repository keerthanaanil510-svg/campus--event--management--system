<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>All Events</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <h1>Campus Event Management System</h1>

    <div  class="navbar">

        <a href="events.html">Events</a>

        <a href="create-event.html">Create Event</a>

        <a href="my-registrations.html">My Registrations</a>

        <button  class="border" onclick="logout()">
            Logout
        </button>

    </div>

    <h2>ALL EVENTS</h2>
        <div id="eventsContainer"></div>

<script>
    if (!localStorage.getItem("user_id")) {

    alert("Please login first");

    window.location.href = "login.html";

}

    async function fetchEvents() {

        const response = await fetch("http://localhost:5000/events");

        const events = await response.json();

        console.log(events);

        const container = document.getElementById("eventsContainer");

        container.innerHTML = "";

        const role = localStorage.getItem("role");

        let adminButtons = "";

        events.forEach((event) => {

            let adminButtons = "";

            if (role === "admin") {

                adminButtons = `
                <button class="border" onclick="deleteEvent(${event.id})">
                    Delete
                </button>

                <button class="border" onclick="editEvent(${event.id})">
                Edit
                </button>
                 `;

}

            container.innerHTML += `
                <div class="event-card">

                    <h2>${event.event_name}</h2>

                    <p>${event.description}</p>

                    <p>Date: ${event.event_date.split("T")[0]}</p>

                    <p>Venue: ${event.venue}</p>

                    <p>Organizer: ${event.organizer}</p>

                    <button class="border" onclick="registerEvent(${event.id})">
                        Register
                    </button>
                   
                    ${adminButtons}
                    

                </div>
            `;

        });

    }

    async function registerEvent(eventId) {

    const registrationData = {

        user_id: localStorage.getItem("user_id"),
        event_id: eventId

    };

    const response = await fetch("http://localhost:5000/register-event", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify(registrationData)

    });

    const result = await response.text();

    alert(result);

}
    async function deleteEvent(eventId) {

        const response = await fetch(
            `http://localhost:5000/events/${eventId}`,
            {
                method: "DELETE",

                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    role: localStorage.getItem("role")
                })
            }
        );

        const result = await response.text();

        alert(result);

        fetchEvents();

}

async function editEvent(eventId) {

    const newName = prompt("Enter new event name:");

    if (!newName) return;

    const response = await fetch(
        `http://localhost:5000/events/${eventId}`,
        {
            method: "PUT",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                event_name: newName,
                description: "Updated Description",
                event_date: "2026-06-01",
                venue: "Updated Venue",
                organizer: "Updated Organizer",
                role: localStorage.getItem("role")
            })
        }
    );

    const result = await response.text();

    alert(result);

    fetchEvents();

}
function logout() {

    localStorage.removeItem("user_id");

    alert("Logged out successfully");

    window.location.href = "login.html";

}

    fetchEvents();

</script>

</body>

</html>
