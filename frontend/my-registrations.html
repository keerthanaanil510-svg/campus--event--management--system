<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My Registrations</title>
</head>

<body>
    <h1>Campus Event Management System</h1>

    <div>

        <a href="events.html">Events</a>

        <a href="create-event.html">Create Event</a>

        <a href="my-registrations.html">My Registrations</a>

        <button onclick="logout()">
            Logout
        </button>

    </div>

    <h2>My Registered Events</h2>

    <div id="container"></div>

    <script>
        function logout() {

        localStorage.removeItem("user_id");

        alert("Logged out successfully");

        window.location.href = "login.html";

}


        if (!localStorage.getItem("user_id")) {

    alert("Please login first");

    window.location.href = "login.html";

}

        async function loadMyEvents() {

            const user_id = localStorage.getItem("user_id"); // temporary (we will connect login later)

            const response = await fetch(`http://localhost:5000/my-registrations/${user_id}`);

            const events = await response.json();

            const container = document.getElementById("container");

            container.innerHTML = "";

            if (events.length === 0) {
                container.innerHTML = "<p>No registrations yet</p>";
                return;
            }

            events.forEach(event => {

                container.innerHTML += `
                    <div style="border:1px solid black; padding:10px; margin:10px;">
                        <h2>${event.event_name}</h2>
                        <p>${event.description}</p>
                        <p>Date: ${event.event_date.split("T")[0]}</p>
                        <p>Venue: ${event.venue}</p>
                        <p>Organizer: ${event.organizer}</p>
                    </div>
                `;

            });

        }

        loadMyEvents();

    </script>

</body>

</html>
